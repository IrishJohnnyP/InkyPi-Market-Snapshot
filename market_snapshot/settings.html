<div class="setting">
  <label for="font_size">Font Size</label>
  <select id="font_size" name="font_size">
    <option value="small"
      {% if plugin.settings.font_size == "small" %}selected{% endif %}>
      Small
    </option>

    <option value="normal"
      {% if plugin.settings.font_size == "normal" or not plugin.settings.font_size %}selected{% endif %}>
      Normal
    </option>

    <option value="large"
      {% if plugin.settings.font_size == "large" %}selected{% endif %}>
      Large
    </option>
  </select>
</div>

<div class="setting">
  <label for="symbols">Symbols</label>
  <input
    type="text"
    id="symbols"
    name="symbols"
    value="{{ settings.symbols }}"
  />
  <p class="help">
    Format: Indices|Stocks|Commodities<br>
    Example:<br>
    <code>^DJI,^GSPC,^IXIC,^VIX|CME,MRX|BTC-USD,GC=F,CL=F</code>
  </p>
</div>
